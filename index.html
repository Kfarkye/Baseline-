<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Baseline | Pro Sports Market Intelligence</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Baseline" />
    <meta name="theme-color" content="#FAF9F6" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/identicon/svg?seed=Baseline&backgroundColor=2D4A3E" />
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ error: message + ' ' + (error ? error.stack : '') })
        });
      };
      window.onunhandledrejection = function(event) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ error: 'Promise Rejection: ' + event.reason })
        });
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
