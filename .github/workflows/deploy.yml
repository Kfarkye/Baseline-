name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy baseline-mlb \
            --source . \
            --project workflowos-a0fbf \
            --region us-central1 \
            --allow-unauthenticated \
            --update-env-vars "NODE_ENV=production" \
            --update-secrets "STRIPE_SECRET_KEY=stripe_secret_key:latest" \
            --update-secrets "FIREBASE_SERVICE_ACCOUNT=firebase_service_account:latest" \
            --update-secrets "ODDS_API_KEY=odds_api_key:latest" \
            --update-secrets "GEMINI_API_KEY=gemini_api_key:latest"

