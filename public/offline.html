<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Baseline Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        background: #faf7f0;
        color: #1c1917;
        display: grid;
        place-items: center;
        padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem max(1.5rem, env(safe-area-inset-bottom));
      }
      main {
        max-width: 32rem;
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        background: #fff;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font: italic 600 2rem/1.1 "Newsreader", Georgia, serif;
        color: #2d4a3e;
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Baseline</h1>
      <p>You are offline right now. Live board updates and chat need an active connection.</p>
      <p>Reconnect to continue with current ESPN-checked game context.</p>
    </main>
  </body>
</html>
